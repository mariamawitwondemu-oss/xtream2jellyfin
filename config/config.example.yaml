app:
  # file_manager_type: "cached"   # "simple" or "cached" (default: "cached")
  # media_dir: "media"            # base media output directory (default: "media")
  # cache_dir: "cache"            # cache directory (default: "cache")
  # write_metadata_nfo: true      # generate NFO metadata files (default: true)

  # Domain validation filters invalid image URLs to speed up Jellyfin library scans (enabled by default)
  # domain_validation_enabled: true
  # domain_validation_timeout_ms: 5000
  # domain_validation_failure_threshold: 3
  # domain_validation_whitelist:
  #   - image.tmdb.org

  # Logging configuration
  logging:
    level: "INFO"                    # Root log level: TRACE, DEBUG, INFO, WARN, ERROR
    loggers:
      "uk.humbkr.xtream2jellyfin": "INFO"

providers:
  provider1:
    username: "your_username"
    password: "your_password"
    url: "http://your-xtream-server.com"
    scan_interval_minutes: 360  # sync interval in minutes (default: 360)

    # HTTP client configuration
    http_client:
      timeout_seconds: 30      # Request timeout (default: 30)
      rate_limit: "100/s"      # Rate limit: {count}/{unit} - s=second, m=minute, h=hour, d=day (default: "100/s")
      retry_delay_seconds: 1   # Delay before retrying failed requests (default: 1)
      max_retries: 3           # Maximum number of retry attempts (default: 3)

    # Category name cleanup patterns (applied to folder names)
    # Jellyfin automatically handles: | -> -, & -> and, : removed, etc.
    category_name_cleanup_patterns:
      "^\\[.*\\]\\s*": ""  # Remove leading brackets
      "\\s*\\[.*\\]$": ""  # Remove trailing brackets

    # Optional: Jellyfin library refresh after sync
    # Library IDs can be found via API: GET /Library/VirtualFolders with header Authorization: MediaBrowser Token=<token>
    # Each library in the response has an ItemId field - use that as the library ID
    libraryRefresh:
      enabled: true
      protocol: "http"
      hostname: "localhost"
      port: 8096
      token: "your_jellyfin_api_token"
      moviesLibraryId: "your_movies_library_id"
      seriesLibraryId: "your_series_library_id"

    settings:
      live:
        enabled: true
        category_folder: true
        use_server_info: false

        # Stream name cleanup patterns
        name_cleanup_patterns:
          "^\\[.*\\]\\s*": ""
          "\\s*\\[.*\\]$": ""

        # Category filtering
        # Use get-live-categories command to find IDs
        include_category_ids: []  # if set, only these categories are processed
        exclude_category_ids: []  # ignored if include_category_ids is set

      movies:
        enabled: true
        category_folder: true
        use_server_info: false

        # Movie title cleanup patterns
        name_cleanup_patterns:
          "^\\[.*\\]\\s*": ""
          "\\s*\\[.*\\]$": ""

        # Category filtering (use get-movies-categories command to find IDs)
        include_category_ids: []  # if set, only these categories are processed
        exclude_category_ids: []  # ignored if include_category_ids is set

      series:
        enabled: true
        category_folder: true
        use_server_info: false

        # Series title cleanup patterns
        name_cleanup_patterns:
          "^\\[.*\\]\\s*": ""
          "\\s*\\[.*\\]$": ""

        # Category filtering (use get-series-categories command to find IDs)
        include_category_ids: []  # if set, only these categories are processed
        exclude_category_ids: []  # ignored if include_category_ids is set
